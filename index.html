<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fisiodori – Fisioterapeuta en Budapest | Physiotherapist Budapest | Fizioterápia Budapest</title>
  <meta name="description" content="Dóra Szöllősi – Fisioterapeuta certificada en Budapest. Especialista en FDM, ventosas, punción seca y Doula. Española, English, Magyar.">
  <meta name="keywords" content="fisioterapeuta Budapest, physiotherapist Budapest, FDM Budapest, cupping Budapest, dry needling Budapest, Doula Budapest, Spanish physiotherapist Budapest">
  <link rel="canonical" href="https://fisiodori.com/">
  <link rel="alternate" hreflang="es" href="https://fisiodori.com/es/">
  <link rel="alternate" hreflang="en" href="https://fisiodori.com/en/">
  <link rel="alternate" hreflang="hu" href="https://fisiodori.com/hu/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2E7D5B;
      --green-light: #3a9970;
      --green-pale: #e8f5ef;
      --cream: #faf8f4;
      --dark: #1a2e25;
      --gold: #c8a96e;
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
    }

    .scene {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem 1rem;
    }

    /* Background - no animation on mobile */
    .bg-hero {
      position: absolute;
      inset: 0;
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.3) saturate(0.6);
    }

    @media (min-width: 769px) {
      .bg-hero { animation: slowZoom 20s ease-in-out infinite alternate; }
    }

    @keyframes slowZoom {
      from { transform: scale(1.0); }
      to { transform: scale(1.06); }
    }

    /* Blobs - hidden on mobile */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      display: none;
    }

    @media (min-width: 769px) {
      .blob { display: block; animation: blobFloat 8s ease-in-out infinite; }
    }

    .blob-1 { width: 500px; height: 500px; background: var(--green); top: -100px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--green-light); bottom: -50px; right: -50px; animation-delay: 3s; }
    .blob-3 { width: 300px; height: 300px; background: var(--gold); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 5s; }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.1); }
    }

    /* Grid lines - no animation on mobile */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,125,91,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,125,91,0.08) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    @media (min-width: 769px) {
      .grid-overlay { animation: gridShift 15s linear infinite; }
    }

    @keyframes gridShift {
      from { background-position: 0 0; }
      to { background-position: 60px 60px; }
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 1.5rem 1rem;
      width: 100%;
      max-width: 600px;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
      animation: fadeDown 0.6s ease forwards;
    }

    .logo-wrap img {
      height: 90px;
      filter: drop-shadow(0 0 20px rgba(46,125,91,0.5));
    }

    @media (min-width: 769px) {
      .logo-wrap img { height: 120px; }
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 7vw, 3.2rem);
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      animation: fadeDown 0.6s 0.15s ease both;
    }

    .tagline em {
      color: var(--gold);
      font-style: italic;
    }

    .subtitle {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s 0.25s ease both;
    }

    .lang-prompt {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      animation: fadeDown 0.6s 0.35s ease both;
    }

    .lang-cards {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.45s ease both;
    }

    .lang-card {
      position: relative;
      width: 140px;
      padding: 1.4rem 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    @media (min-width: 769px) {
      .lang-card { width: 160px; padding: 1.8rem 1.2rem; }
      .lang-card:hover {
        transform: translateY(-8px) scale(1.05);
        border-color: var(--green);
        box-shadow: 0 20px 60px rgba(46,125,91,0.4);
      }
    }

    .lang-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 16px;
    }

    .lang-card:hover::before, .lang-card:active::before { opacity: 1; }

    .lang-card * { position: relative; z-index: 1; }

    .lang-flag {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .lang-name {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .lang-desc {
      display: block;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
    }

    /* Floating particles - desktop only */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      display: none;
    }

    @media (min-width: 769px) {
      .particles { display: block; }
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--green-light);
      border-radius: 50%;
      opacity: 0;
      animation: particleRise 6s ease-in infinite;
    }

    @keyframes particleRise {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo rings - desktop only */
    .logo-ring {
      position: absolute;
      width: 140px;
      height: 140px;
      border: 1px solid rgba(46,125,91,0.3);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: none;
    }

    @media (min-width: 769px) {
      .logo-ring { display: block; }
    }

    .logo-ring:nth-child(2) { animation-delay: 1s; }
    .logo-ring:nth-child(3) { animation-delay: 2s; }

    @keyframes ringPulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    .logo-container { position: relative; display: inline-block; }

    @media (max-width: 480px) {
      .lang-cards { gap: 0.8rem; }
      .lang-card { width: 130px; padding: 1.2rem 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg-hero"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="content">
      <div class="logo-wrap">
        <div class="logo-container">
          <div class="logo-ring"></div>
          <div class="logo-ring"></div>
          <div class="logo-ring"></div>
          <img src="images/logo_white.png" alt="Fisiodori Logo">
        </div>
      </div>

      <h1 class="tagline">Tu fisioterapeuta en<br><em>Budapest</em></h1>
      <p class="subtitle">FDM · Cupping · Dry Needling · Doula</p>

      <p class="lang-prompt">Elige tu idioma / Choose your language / Válassz nyelvet</p>

      <div class="lang-cards">
        <a href="es/index.html" class="lang-card" hreflang="es">
          <span class="lang-flag">🇪🇸</span>
          <span class="lang-name">Español</span>
          <span class="lang-desc">Versión en español</span>
        </a>
        <a href="en/index.html" class="lang-card" hreflang="en">
          <span class="lang-flag">🇬🇧</span>
          <span class="lang-name">English</span>
          <span class="lang-desc">English version</span>
        </a>
        <a href="hu/index.html" class="lang-card" hreflang="hu">
          <span class="lang-flag">🇭🇺</span>
          <span class="lang-name">Magyar</span>
          <span class="lang-desc">Magyar változat</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = '0';
      p.style.width = (Math.random() * 4 + 2) + 'px';
      p.style.height = p.style.width;
      p.style.animationDelay = (Math.random() * 6) + 's';
      p.style.animationDuration = (Math.random() * 4 + 4) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
